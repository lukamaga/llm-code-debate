version: '3.8'

services:

  ollama:
    image: ollama/ollama:latest
    container_name: debate-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    
  debate-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: debate-system
    ports:
      - "5000:5000"
    volumes:
      - ./results:/app/results
      - ./tasks:/app/tasks
      - ./debate_results.db:/app/debate_results.db
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    command: python -m src.main --web

volumes:
  ollama_data:
